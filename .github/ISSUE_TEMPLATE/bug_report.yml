name: Bug Report
description: Report a bug or regression in Tryx
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail for reproducibility.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: Short and clear bug summary
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include exact steps and sample code if possible.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste relevant logs or traceback.
      render: shell

  - type: input
    id: version
    attributes:
      label: Tryx Version
      placeholder: e.g. 0.2.1
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g. 3.12.3
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04 / macOS 15 / Windows 11
    validations:
      required: true
